name: Daily Meta Report

on:
  schedule:
    # 17:59 UTC = 23:59 Bangladesh Time (UTC+6)
    - cron: "59 17 * * *"
  workflow_dispatch:

jobs:
  trigger-report:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway report endpoint
        run: |
          curl --fail --show-error --silent "https://cheero-bot-production.up.railway.app/run-report"
